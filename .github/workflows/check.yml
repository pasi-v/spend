name: check

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: dev-requirements.txt

      - name: Install dev dependencies
        run: pip install -r dev-requirements.txt

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy spend tests

      - name: pytest
        run: pytest
